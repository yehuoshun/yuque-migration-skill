name: DingTalk Notify
on:
  push:
    branches: ["main", "master"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          echo '${{ toJson(github.event.commits) }}' | python3 -c "
import json,sys
data=json.load(sys.stdin)
print(len(data))
"
          echo "done"
