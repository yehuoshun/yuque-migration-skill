name: DingTalk Notify
on:
  push:
    branches: ["main", "master"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          python3 -c "
print('hello')
print('world')
"
          echo "done"
