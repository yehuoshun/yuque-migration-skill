name: DingTalk Notify
on:
  push:
    branches: ["main", "master"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to DingTalk
        env:
          WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          COMMITS_JSON='${{ toJson(github.event.commits) }}'
          COMMIT_LIST=$(echo "$COMMITS_JSON" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          msgs = []
          for c in data[:5]:
              author = c.get("author", {}).get("name", "unknown")
              msg = c.get("message", "").split("\n")[0][:80]
              msgs.append(f"- **{author}**: {msg}")
          result = "\n".join(msgs)
          if len(data) > 5:
              result += f"\n...等{len(data)}条提交"
          print(result)
          ')

          TEXT="## 🚀 Push · yuque-migration-skill\n\n"
          TEXT="${TEXT}**分支**: ${{ github.ref_name }}\n"
          TEXT="${TEXT}**提交者**: ${{ github.actor }}\n\n"
          TEXT="${TEXT}${COMMIT_LIST}\n\n"
          TEXT="${TEXT}[查看变更](${{ github.event.compare }})"

          ESCAPED=$(echo "$TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"yuque-migration-skill - push\",\"text\":$ESCAPED}}"
