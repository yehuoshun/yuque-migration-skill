name: Package Zip

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          mkdir -p dist/yuque-migration-skill
          # 只打包运行必需文件，排除 README .github progress logs 等
          cp -r SKILL.md scripts references dist/yuque-migration-skill/
          # config 目录只带 .gitkeep 占位，不含真实凭据
          mkdir -p dist/yuque-migration-skill/config
          cp config/.gitkeep dist/yuque-migration-skill/config/
          cd dist
          zip -r yuque-migration-skill.zip yuque-migration-skill/
          mv yuque-migration-skill.zip ../

      - name: Generate changelog
        id: changelog
        run: |
          # 上次 release 以来的所有提交，含完整 commit message（标题+正文）
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- **%s**%n%b" --no-merges)
          else
            LOG=$(git log --pretty=format:"- **%s**%n%b" --no-merges)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: yuque-migration-skill.zip

      - name: Upload to latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            ## 📝 最近变更

            ${{ steps.changelog.outputs.log }}

            📦 包含完整源码 + 配置模板 + 迁移脚本

            📖 [SKILL.md 执行规范](https://github.com/yehuoshun/yuque-migration-skill/blob/main/SKILL.md)
          files: yuque-migration-skill.zip
          draft: false
          prerelease: false
