name: Release SKILL.md

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: version
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "commit message: $MSG"
          # 提取版本号：匹配 v开头后跟数字+点的模式，如 v4.1 v4.2.0
          VER=$(echo "$MSG" | grep -oP '^v\d+(\.\d+)+' || echo "")
          if [ -n "$VER" ]; then
            echo "version=$VER" >> $GITHUB_OUTPUT
            echo "is_versioned=true" >> $GITHUB_OUTPUT
            echo "Found version: $VER"
          else
            echo "is_versioned=false" >> $GITHUB_OUTPUT
            echo "No version tag in commit message, updating latest only"
          fi

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest
          tag_name: latest
          body: |
            ## 📦 语雀知识库迁移 Skill

            [查看文档](https://github.com/${{ github.repository }}#readme)
          files: SKILL.md
          make_latest: true

      - name: Create Versioned Release
        if: steps.version.outputs.is_versioned == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            ## 📦 语雀知识库迁移 Skill ${{ steps.version.outputs.version }}

            [查看文档](https://github.com/${{ github.repository }}#readme)
          files: SKILL.md

      - name: Notify DingTalk
        if: always()
        uses: yehuoshun/yehuoshun-notify@main
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          event: release
