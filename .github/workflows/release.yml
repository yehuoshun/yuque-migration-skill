name: Release SKILL.md

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest
          tag_name: latest
          body: |
            ## 📦 语雀知识库迁移 Skill

            [查看文档](https://github.com/${{ github.repository }}#readme)
          files: SKILL.md
          make_latest: true

      - name: Notify DingTalk
        if: always()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: python3 scripts/release-notify.py
