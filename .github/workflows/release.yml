name: Release SKILL.md

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto Tag
        run: |
          VER=$(echo "${{ github.event.head_commit.message }}" | grep -oP '^v\d+(\.\d+)*' | head -1)
          if [ -n "$VER" ]; then
            if ! git rev-parse "$VER" >/dev/null 2>&1; then
              git tag -a "$VER" -m "Release $VER"
              git push origin "$VER"
              echo "✅ Tagged $VER"
            else
              echo "⏭️ Tag $VER already exists"
            fi
          else
            echo "⏭️ No version prefix found in commit message"
          fi

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest
          tag_name: latest
          body: |
            ## 📦 语雀知识库迁移 Skill

            [查看文档](https://github.com/${{ github.repository }}#readme)
          files: SKILL.md
          make_latest: true

      - name: Notify DingTalk
        if: always()
        uses: yehuoshun/yehuoshun-notify@main
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          event: release
